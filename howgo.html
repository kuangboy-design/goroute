<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e8590c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HowGo 覓食" />
  <title>HowGo · 吃啥!</title>
  <style>
    :root { --accent:#c2734a; --accent-d:#9c5836; --bg:#e7e0d9; --card:#fff; --text:#241a14; --muted:#7a6a60; --line:#ddd3c9; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0 auto; max-width:560px; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",Roboto,sans-serif;
      padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 28px); }
    header { padding:20px 4px 8px; }
    h1 { font-size:25px; margin:0; letter-spacing:-.5px; } h1 span { color:var(--accent); }
    .sub { color:var(--muted); font-size:13px; margin-top:3px; }
    .nav-row { display:flex; gap:7px; margin-top:12px; }
    .nav-row a { flex:1; text-align:center; font-size:13px; padding:8px 4px; border-radius:999px; text-decoration:none;
      background:#fce8dc; color:var(--accent-d); border:1px solid var(--line); font-weight:600; white-space:nowrap; }
    .card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 12px; }
    .status { font-size:13px; color:var(--muted); } .status.err { color:#c92a2a; }
    label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin:12px 0 6px; }
    .opts { display:flex; gap:8px; }
    .opt { flex:1; } .opt input { position:absolute; opacity:0; pointer-events:none; }
    .opt label { display:block; margin:0; text-align:center; padding:11px 4px; border:1.5px solid var(--line); border-radius:11px;
      font-size:14px; font-weight:600; color:var(--text); cursor:pointer; background:#fff; }
    .opt input:checked + label { background:var(--accent); color:#fff; border-color:var(--accent); }
    select { width:100%; font-size:16px; padding:12px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--text); -webkit-appearance:none; appearance:none; }
    select:focus { outline:none; border-color:var(--accent); }
    .btn { display:block; width:100%; padding:15px; border:none; border-radius:12px; background:var(--accent); color:#fff;
      font-size:17px; font-weight:800; cursor:pointer; margin-top:6px; } .btn:disabled { opacity:.55; }
    .btn.alt { background:#fff; color:var(--accent-d); border:1.5px solid var(--accent); font-size:15px; padding:12px; margin-top:10px; }
    .rest { border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; background:#fffdfb; }
    .rest-name { font-weight:700; font-size:16px; }
    .rest-meta { font-size:12px; color:var(--muted); margin-top:2px; }
    .rest-actions { display:flex; gap:8px; margin-top:8px; }
    .rest-actions a { flex:1; text-align:center; font-size:13px; padding:9px; border-radius:9px; text-decoration:none; font-weight:600; }
    .rest-actions .go { background:var(--accent); color:#fff; }
    .rest-actions .rev { background:#fce8dc; color:var(--accent-d); border:1px solid var(--line); }
    .note { font-size:11px; color:var(--muted); margin-top:8px; line-height:1.6; }
    .empty { color:var(--muted); font-size:14px; text-align:center; padding:10px; }
    .hide { display:none !important; }
    footer { text-align:center; font-size:11px; color:var(--muted); margin-top:16px; line-height:1.6; }
  </style>
</head>
<body>
  <header>
    <h1>How<span>Go</span> · 吃啥!</h1>
    <div class="sub">依你目前位置和想吃的類型,找附近餐廳 🍽️</div>
    <div class="nav-row">
      <a href="index.html">🧭 導航</a>
      <a href="services.html">🍽️ 客棧</a>
      <a href="tickets.html">🎟️ 售票</a>
      <a href="songyou.html">🧳 爽旅</a>
    </div>
  </header>

  <div class="card">
    <h2>📍 你的位置</h2>
    <div id="locStatus" class="status">正在定位…</div>
    <div id="placeName" class="status hide" style="margin-top:4px;"></div>
  </div>

  <div class="card">
    <h2>🍴 條件</h2>
    <label>想吃哪一種?</label>
    <select id="cuisine">
      <option value="">不限</option>
      <option value="chinese">中式</option>
      <option value="taiwanese">台式</option>
      <option value="japanese">日式</option>
      <option value="korean">韓式</option>
      <option value="thai">泰式</option>
      <option value="italian">義式 / 披薩</option>
      <option value="american">美式 / 漢堡</option>
      <option value="hotpot">火鍋</option>
      <option value="bbq">燒烤</option>
      <option value="cafe">咖啡 / 甜點</option>
      <option value="vegetarian">素食</option>
    </select>
    <label>搜尋範圍</label>
    <div class="opts">
      <div class="opt"><input type="radio" name="rad" id="r1" value="1000" /><label for="r1">1 km</label></div>
      <div class="opt"><input type="radio" name="rad" id="r3" value="3000" checked /><label for="r3">3 km</label></div>
      <div class="opt"><input type="radio" name="rad" id="r5" value="5000" /><label for="r5">5 km</label></div>
    </div>
    <button class="btn" id="findBtn">🍽️ 找附近餐廳</button>
    <a class="btn alt" id="mapsBtn" target="_blank" rel="noopener">💰 在 Google 地圖看價位與評價</a>
    <div class="note">附近餐廳清單來自 OpenStreetMap(免費、無價位資料);要看 $ 價位、評價與依預算篩選,請用上面的 Google 地圖按鈕。</div>
  </div>

  <div class="card hide" id="resultCard">
    <h2 id="resultHead">🍜 附近餐廳</h2>
    <div id="restList"></div>
  </div>

  <footer>HowGo · 吃啥! · 定位與清單 zero-setup</footer>

<script>
(function () {
  "use strict";
  var el = function (id) { return document.getElementById(id); };
  var enc = function (s) { return encodeURIComponent(s || ""); };
  var here = null, placeName = "";

  var CUI = { chinese:"中式", japanese:"日式", korean:"韓式", thai:"泰式", italian:"義式", american:"美式",
    pizza:"披薩", burger:"漢堡", sushi:"壽司", ramen:"拉麵", noodle:"麵食", noodles:"麵食", seafood:"海鮮",
    vegetarian:"素食", vegan:"純素", indian:"印度", french:"法式", mexican:"墨西哥", cafe:"咖啡", coffee_shop:"咖啡",
    dessert:"甜點", bbq:"燒烤", barbecue:"燒烤", hotpot:"火鍋", steak_house:"牛排", fast_food:"速食", asian:"亞洲",
    breakfast:"早餐", dumpling:"水餃", taiwanese:"台式", cake:"蛋糕", bubble_tea:"手搖飲" };

  // cuisine filter value -> raw OSM cuisine keywords to match
  var CUI_FILTER = {
    chinese:["chinese"], taiwanese:["taiwanese","chinese"], japanese:["japanese","sushi","ramen"],
    korean:["korean"], thai:["thai"], italian:["italian","pizza"], american:["american","burger","steak"],
    hotpot:["hotpot","hot_pot","shabu"], bbq:["bbq","barbecue"], cafe:["cafe","coffee_shop","coffee","dessert","cake"],
    vegetarian:["vegetarian","vegan"] };
  function cuisineLabel() { var s = el("cuisine"); return (s && s.value) ? s.options[s.selectedIndex].text : ""; }
  function updateMapsBtn() {
    if (!here) return;
    var q = (cuisineLabel() ? cuisineLabel() + " " : "") + "餐廳";
    el("mapsBtn").href = "https://www.google.com/maps/search/" + enc(q) + "/@" + here.lat + "," + here.lng + ",15z";
  }

  function picked(name) { var n = document.querySelector('input[name="' + name + '"]:checked'); return n ? n.value : ""; }
  function cuisineZh(tag) {
    if (!tag) return "";
    var parts = tag.split(/[;_]/);
    for (var i = 0; i < parts.length; i++) { if (CUI[parts[i]]) return CUI[parts[i]]; }
    return tag.split(";")[0].replace(/_/g, " ");
  }
  function dist(aLat, aLng, bLat, bLng) {
    var R = 6371000, toR = Math.PI / 180;
    var dLat = (bLat - aLat) * toR, dLng = (bLng - aLng) * toR;
    var s = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(aLat*toR)*Math.cos(bLat*toR)*Math.sin(dLng/2)*Math.sin(dLng/2);
    return 2 * R * Math.asin(Math.sqrt(s));
  }
  function fmtDist(m) { return m < 1000 ? Math.round(m) + " m" : (m/1000).toFixed(1) + " km"; }

  function initLocation() {
    if (!navigator.geolocation) { el("locStatus").textContent = "此瀏覽器無法定位。"; return; }
    navigator.geolocation.getCurrentPosition(function (pos) {
      here = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      el("locStatus").textContent = "✅ 已定位(" + here.lat.toFixed(4) + ", " + here.lng.toFixed(4) + ")";
      updateMapsBtn();
      fetch("https://nominatim.openstreetmap.org/reverse?format=json&zoom=16&accept-language=zh-TW&lat=" + here.lat + "&lon=" + here.lng, { headers: { "Accept": "application/json" } })
        .then(function (r) { return r.json(); })
        .then(function (d) { placeName = (d && d.display_name) ? d.display_name : ""; if (placeName) { el("placeName").textContent = placeName; el("placeName").classList.remove("hide"); } })
        .catch(function () {});
    }, function (err) {
      el("locStatus").className = "status err";
      el("locStatus").textContent = (err.code === 1) ? "定位被拒,請允許定位後重新整理。" : "無法取得位置。";
    }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
  }

  // Overpass mirrors — try each in order until one responds (avoids "Failed to fetch")
  var OVERPASS = [
    "https://overpass-api.de/api/interpreter",
    "https://overpass.kumi.systems/api/interpreter",
    "https://maps.mail.ru/osm/tools/overpass/api/interpreter",
    "https://overpass.private.coffee/api/interpreter"
  ];
  function overpassQuery(q, i) {
    i = i || 0;
    if (i >= OVERPASS.length) return Promise.reject(new Error("所有 Overpass 節點都連不上"));
    var ctrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
    var to = setTimeout(function () { if (ctrl) ctrl.abort(); }, 18000);
    return fetch(OVERPASS[i], { method: "POST", body: "data=" + encodeURIComponent(q), signal: ctrl ? ctrl.signal : undefined })
      .then(function (r) { clearTimeout(to); if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .catch(function () { clearTimeout(to); return overpassQuery(q, i + 1); });
  }
  function find() {
    if (!here) { alert("尚未取得你的位置,請允許定位後再試。"); return; }
    var radius = picked("rad") || "3000";
    var btn = el("findBtn"); btn.disabled = true; var old = btn.textContent; btn.textContent = "搜尋中…";
    var q = "[out:json][timeout:25];(" +
      'node["amenity"="restaurant"](around:' + radius + ',' + here.lat + ',' + here.lng + ');' +
      'way["amenity"="restaurant"](around:' + radius + ',' + here.lat + ',' + here.lng + ');' +
      ");out center 150;";
    overpassQuery(q)
      .then(function (d) {
        var kws = CUI_FILTER[el("cuisine").value] || null;
        var list = (d.elements || []).map(function (e) {
          var lat = e.lat != null ? e.lat : (e.center && e.center.lat);
          var lng = e.lon != null ? e.lon : (e.center && e.center.lon);
          var tags = e.tags || {};
          if (!lat || !lng || !tags.name) return null;
          var raw = tags.cuisine ? String(tags.cuisine).toLowerCase() : "";
          return { name: tags.name, cuisine: cuisineZh(tags.cuisine), raw: raw, lat: lat, lng: lng, d: dist(here.lat, here.lng, lat, lng) };
        }).filter(Boolean);
        if (kws) list = list.filter(function (r) { for (var i = 0; i < kws.length; i++) { if (r.raw.indexOf(kws[i]) >= 0) return true; } return false; });
        list = list.sort(function (a, b) { return a.d - b.d; }).slice(0, 50);
        render(list, radius);
      })
      .catch(function (e) {
        el("restList").innerHTML = '<div class="empty" style="color:#c92a2a">搜尋失敗:' + (e.message || e) +
          '<br>多個 Overpass 節點都忙碌或被擋,請稍後再試,或改用上方「💰 Google 地圖」按鈕(那是 Google 真實資料)。</div>';
        el("resultCard").classList.remove("hide");
      })
      .then(function () { btn.disabled = false; btn.textContent = old; });
  }

  function render(list, radius) {
    el("resultHead").textContent = "🍜 附近餐廳(" + (radius/1000) + " km" + (cuisineLabel() ? " · " + cuisineLabel() : "") + ")";
    var box = el("restList");
    if (!list.length) { box.innerHTML = '<div class="empty">這個範圍內找不到登錄的餐廳,試試加大範圍,或用 Google 地圖按鈕。</div>'; el("resultCard").classList.remove("hide"); return; }
    box.innerHTML = "";
    list.forEach(function (r) {
      var dir = "https://www.google.com/maps/dir/?api=1&origin=" + here.lat + "," + here.lng + "&destination=" + r.lat + "," + r.lng;
      var rev = "https://www.google.com/maps/search/?api=1&query=" + enc(r.name);
      var div = document.createElement("div"); div.className = "rest";
      div.innerHTML =
        '<div class="rest-name"></div>' +
        '<div class="rest-meta">' + (r.cuisine ? r.cuisine + " · " : "") + "距離約 " + fmtDist(r.d) + '</div>' +
        '<div class="rest-actions">' +
          '<a class="go" href="' + dir + '" target="_blank" rel="noopener">🧭 帶我去</a>' +
          '<a class="rev" href="' + rev + '" target="_blank" rel="noopener">🔍 評價/價位</a>' +
        '</div>';
      div.querySelector(".rest-name").textContent = r.name;   // safe text
      box.appendChild(div);
    });
    el("resultCard").classList.remove("hide");
    el("resultCard").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  el("findBtn").addEventListener("click", find);
  el("cuisine").addEventListener("change", updateMapsBtn);
  initLocation();
})();
</script>
</body>
</html>
