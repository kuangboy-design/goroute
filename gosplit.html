<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2f9e44" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="appicon-180.png" />
  <meta name="apple-mobile-web-app-title" content="GoSplit 麥走!" />
  <title>GoSplit · 麥走!</title>
  <style>
    :root { --accent:#2f9e44; --accent-d:#268239; --bg:#eef7f0; --card:#fff; --text:#16241a; --muted:#5b6b60; --line:#d7e8db; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0 auto; max-width:560px; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",Roboto,sans-serif;
      padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 28px); }
    header { padding:20px 4px 8px; } h1 { font-size:25px; margin:0; } h1 span { color:var(--accent); }
    .sub { color:var(--muted); font-size:13px; margin-top:3px; }
    .nav-row { display:flex; gap:8px; margin-top:12px; }
    .nav-row a { flex:1; text-align:center; font-size:13px; padding:8px 6px; border-radius:999px; text-decoration:none;
      background:#e3f2e7; color:var(--accent-d); border:1px solid var(--line); font-weight:600; }
    .card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 12px; }
    label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin:12px 0 6px; }
    input { width:100%; font-size:18px; padding:12px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--text); }
    input:focus { outline:none; border-color:var(--accent); }
    .opts { display:flex; gap:8px; flex-wrap:wrap; }
    .opt { flex:1; min-width:60px; } .opt input { position:absolute; opacity:0; pointer-events:none; }
    .opt label { display:block; margin:0; text-align:center; padding:11px 4px; border:1.5px solid var(--line); border-radius:11px;
      font-size:15px; font-weight:600; color:var(--text); cursor:pointer; background:#fff; }
    .opt input:checked + label { background:var(--accent); color:#fff; border-color:var(--accent); }
    .stepper { display:inline-flex; align-items:center; border:1.5px solid var(--line); border-radius:10px; overflow:hidden; }
    .stepper button { width:48px; height:48px; border:none; background:#e3f2e7; color:var(--text); font-size:24px; font-weight:700; cursor:pointer; }
    .stepper input { width:64px; text-align:center; border:none; font-size:20px; font-weight:700; padding:12px 0; }
    .rowline { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
    .rowline input { flex:1; }
    .rowline button { width:44px; height:44px; border:none; border-radius:9px; background:#fde8e8; color:#c92a2a; font-size:18px; cursor:pointer; }
    .addbtn { width:100%; padding:11px; border:1.5px dashed var(--accent); background:#fff; color:var(--accent-d); border-radius:10px; font-weight:700; cursor:pointer; }
    .out { text-align:center; }
    .out .each { font-size:40px; font-weight:800; color:var(--accent); }
    .out .tot { font-size:14px; color:var(--muted); margin-top:6px; }
    .out .rows { text-align:left; margin-top:10px; font-size:14px; }
    .out .rows div { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--line); }
    .hide { display:none !important; }
    footer { text-align:center; font-size:11px; color:var(--muted); margin-top:16px; }
  </style>
</head>
<body>
  <header>
    <h1>Go<span>Split</span> · 麥走!</h1>
    <div class="sub">一群人吃飯 AA、可加小費,也能各付各的 🧾</div>
    <div class="nav-row">
      <a href="hub.html">🎒 全部服務 · Day-A-GoGo</a>
    </div>
  </header>

  <div class="card">
    <h2>💵 帳單</h2>
    <label>總金額(各付各時不用填)</label>
    <input id="total" type="number" inputmode="decimal" placeholder="例如 1200" />

    <label>小費 / 服務費</label>
    <div class="opts">
      <div class="opt"><input type="radio" name="tip" id="t0" value="0" checked /><label for="t0">0%</label></div>
      <div class="opt"><input type="radio" name="tip" id="t10" value="10" /><label for="t10">10%</label></div>
      <div class="opt"><input type="radio" name="tip" id="t15" value="15" /><label for="t15">15%</label></div>
    </div>

    <label>分法</label>
    <div class="opts">
      <div class="opt"><input type="radio" name="mode" id="mEven" value="even" checked /><label for="mEven">均分 AA</label></div>
      <div class="opt"><input type="radio" name="mode" id="mItems" value="items" /><label for="mItems">各付各的</label></div>
    </div>

    <div id="evenBox">
      <label>幾個人?</label>
      <div class="stepper">
        <button type="button" id="pplMinus">−</button>
        <input id="people" type="text" inputmode="numeric" readonly value="2" />
        <button type="button" id="pplPlus">+</button>
      </div>
    </div>

    <div id="itemsBox" class="hide">
      <label>每個人吃了多少?</label>
      <div id="rows"></div>
      <button class="addbtn" id="addRow">＋ 新增一人</button>
    </div>
  </div>

  <div class="card">
    <h2>🧮 結果</h2>
    <div class="out" id="out"><div class="each">—</div></div>
  </div>

  <footer>GoSplit · 分帳 · 純前端,不需網路</footer>

<script>
(function () {
  "use strict";
  var el = function (id) { return document.getElementById(id); };
  var picked = function (n) { var x = document.querySelector('input[name="' + n + '"]:checked'); return x ? x.value : ""; };
  var money = function (v) { return "NT$" + (Math.round(v * 100) / 100).toLocaleString(); };

  function addRow(val) {
    var div = document.createElement("div"); div.className = "rowline";
    div.innerHTML = '<input type="number" inputmode="decimal" placeholder="此人金額" class="amt" /><button type="button">✕</button>';
    div.querySelector(".amt").value = val || "";
    div.querySelector(".amt").addEventListener("input", recompute);
    div.querySelector("button").addEventListener("click", function () { div.remove(); recompute(); });
    el("rows").appendChild(div);
  }

  function recompute() {
    var tip = parseFloat(picked("tip")) || 0, mul = 1 + tip / 100;
    var mode = picked("mode"), out = el("out");
    if (mode === "even") {
      var total = parseFloat(el("total").value) || 0;
      var n = parseInt(el("people").value, 10) || 1;
      var grand = total * mul, each = grand / n;
      out.innerHTML = '<div class="each">' + money(each) + '</div>' +
        '<div class="tot">每人應付 · 共 ' + n + ' 人 · 含小費總計 ' + money(grand) + (tip ? "(+" + tip + "%)" : "") + '</div>';
    } else {
      var amts = Array.prototype.map.call(document.querySelectorAll(".amt"), function (i) { return parseFloat(i.value) || 0; });
      var sum = amts.reduce(function (a, b) { return a + b; }, 0);
      var grand2 = sum * mul;
      var rows = amts.map(function (a, i) { return '<div><span>第 ' + (i + 1) + ' 人</span><span>' + money(a * mul) + '</span></div>'; }).join("");
      out.innerHTML = '<div class="each">' + money(grand2) + '</div>' +
        '<div class="tot">全部含小費總計' + (tip ? "(+" + tip + "%)" : "") + '</div>' +
        '<div class="rows">' + rows + '</div>';
    }
  }

  function setMode() {
    var items = picked("mode") === "items";
    el("itemsBox").classList.toggle("hide", !items);
    el("evenBox").classList.toggle("hide", items);
    recompute();
  }

  el("pplMinus").addEventListener("click", function () { el("people").value = Math.max(1, (parseInt(el("people").value, 10) || 1) - 1); recompute(); });
  el("pplPlus").addEventListener("click", function () { el("people").value = Math.min(50, (parseInt(el("people").value, 10) || 1) + 1); recompute(); });
  el("total").addEventListener("input", recompute);
  el("addRow").addEventListener("click", function () { addRow(); });
  Array.prototype.forEach.call(document.querySelectorAll('input[name="tip"]'), function (r) { r.addEventListener("change", recompute); });
  Array.prototype.forEach.call(document.querySelectorAll('input[name="mode"]'), function (r) { r.addEventListener("change", setMode); });

  addRow(); addRow();   // start items mode with 2 rows ready
  recompute();
})();
</script>
</body>
</html>
