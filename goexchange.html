<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1c7ed6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="appicon-180.png" />
  <meta name="apple-mobile-web-app-title" content="GoExchange 匯率" />
  <title>GoExchange · 匯率換算</title>
  <style>
    :root { --accent:#1c7ed6; --accent-d:#1864ab; --bg:#eef4fb; --card:#fff; --text:#16202c; --muted:#5b6675; --line:#d8e2ef; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0 auto; max-width:560px; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",Roboto,sans-serif;
      padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 28px); }
    header { padding:20px 4px 8px; } h1 { font-size:25px; margin:0; } h1 span { color:var(--accent); }
    .sub { color:var(--muted); font-size:13px; margin-top:3px; }
    .nav-row { display:flex; gap:8px; margin-top:12px; }
    .nav-row a { flex:1; text-align:center; font-size:13px; padding:8px 6px; border-radius:999px; text-decoration:none;
      background:#e3eefb; color:var(--accent-d); border:1px solid var(--line); font-weight:600; }
    .card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin:6px 0 6px; }
    input, select { width:100%; font-size:18px; padding:13px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--text); -webkit-appearance:none; appearance:none; }
    input:focus, select:focus { outline:none; border-color:var(--accent); }
    .pair { display:flex; gap:10px; align-items:flex-end; }
    .pair > div { flex:1; }
    .swap { width:100%; margin:10px 0 0; padding:11px; border:1.5px solid var(--accent); background:#fff; color:var(--accent-d); border-radius:10px; font-weight:700; cursor:pointer; }
    .out { text-align:center; padding:6px 0; }
    .out .big { font-size:38px; font-weight:800; color:var(--accent); line-height:1.1; }
    .out .rate { font-size:13px; color:var(--muted); margin-top:8px; }
    .status { font-size:12px; color:var(--muted); text-align:center; margin-top:6px; }
    .status.err { color:#c92a2a; }
    footer { text-align:center; font-size:11px; color:var(--muted); margin-top:16px; }
  </style>
</head>
<body>
  <header>
    <h1>Go<span>Exchange</span> · 匯率</h1>
    <div class="sub">即時匯率換算,出國旅遊必備 💱</div>
    <div class="nav-row">
      <a href="hub.html">🎒 全部服務 · Day-A-GoGo</a>
    </div>
  </header>

  <div class="card">
    <label>金額</label>
    <input id="amount" type="number" inputmode="decimal" value="100" />
    <div class="pair" style="margin-top:10px;">
      <div><label>從</label><select id="from"></select></div>
      <div><label>到</label><select id="to"></select></div>
    </div>
    <button class="swap" id="swap">⇅ 對調</button>
  </div>

  <div class="card">
    <div class="out">
      <div class="big" id="result">—</div>
      <div class="rate" id="rate"></div>
    </div>
    <div class="status" id="status">載入匯率中…</div>
  </div>

  <footer>GoExchange · 匯率資料 open.er-api.com(免費)· 僅供參考</footer>

<script>
(function () {
  "use strict";
  var el = function (id) { return document.getElementById(id); };
  var CCY = [
    ["TWD","新台幣 TWD"],["USD","美元 USD"],["JPY","日圓 JPY"],["EUR","歐元 EUR"],["KRW","韓元 KRW"],
    ["CNY","人民幣 CNY"],["HKD","港幣 HKD"],["THB","泰銖 THB"],["SGD","新加坡幣 SGD"],["GBP","英鎊 GBP"],
    ["AUD","澳幣 AUD"],["VND","越南盾 VND"],["MYR","馬來幣 MYR"],["PHP","披索 PHP"],["IDR","印尼盾 IDR"],["CAD","加幣 CAD"]
  ];
  var rates = null;

  function fill(sel, def) {
    CCY.forEach(function (c) { var o = document.createElement("option"); o.value = c[0]; o.textContent = c[1]; if (c[0] === def) o.selected = true; sel.appendChild(o); });
  }
  fill(el("from"), "TWD"); fill(el("to"), "JPY");

  function fmt(v) { return (Math.round(v * 100) / 100).toLocaleString(undefined, { maximumFractionDigits: 2 }); }

  function convert() {
    if (!rates) return;
    var amt = parseFloat(el("amount").value) || 0;
    var f = el("from").value, t = el("to").value;
    if (!rates[f] || !rates[t]) { el("result").textContent = "—"; return; }
    var usd = amt / rates[f];          // base of API is USD
    var res = usd * rates[t];
    el("result").textContent = fmt(res) + " " + t;
    var one = (1 / rates[f]) * rates[t];
    el("rate").textContent = "1 " + f + " ≈ " + fmt(one) + " " + t;
  }

  function load() {
    el("status").className = "status";
    el("status").textContent = "載入匯率中…";
    fetch("https://open.er-api.com/v6/latest/USD")
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (!d || !d.rates) throw new Error("匯率資料異常");
        rates = d.rates;
        var when = d.time_last_update_utc ? d.time_last_update_utc.replace(" +0000", " UTC") : "";
        el("status").textContent = "匯率更新:" + when;
        convert();
      })
      .catch(function (e) {
        el("status").className = "status err";
        el("status").textContent = "匯率載入失敗:" + (e.message || e) + "(請檢查網路後重新整理)";
      });
  }

  el("amount").addEventListener("input", convert);
  el("from").addEventListener("change", convert);
  el("to").addEventListener("change", convert);
  el("swap").addEventListener("click", function () {
    var f = el("from").value; el("from").value = el("to").value; el("to").value = f; convert();
  });
  load();
})();
</script>
</body>
</html>
