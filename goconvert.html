<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0ca678" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GoConvert 換算" />
  <link rel="apple-touch-icon" href="appicon-180.png" />
  <title>GoConvert · 單位換算</title>
  <style>
    :root { --accent:#0ca678; --accent-d:#099268; --bg:#eef9f4; --card:#fff; --text:#13241c; --muted:#566b60; --line:#d6ebe1; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0 auto; max-width:560px; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",Roboto,sans-serif;
      padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 28px); }
    header { padding:20px 4px 8px; } h1 { font-size:25px; margin:0; } h1 span { color:var(--accent); }
    .sub { color:var(--muted); font-size:13px; margin-top:3px; }
    .nav-row { display:flex; gap:8px; margin-top:12px; }
    .nav-row a { flex:1; text-align:center; font-size:13px; padding:8px 6px; border-radius:999px; text-decoration:none;
      background:#dff3ec; color:var(--accent-d); border:1px solid var(--line); font-weight:600; }
    .card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin:10px 0 6px; }
    input, select { width:100%; font-size:18px; padding:12px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--text); -webkit-appearance:none; appearance:none; }
    input:focus, select:focus { outline:none; border-color:var(--accent); }
    .cats { display:flex; gap:8px; flex-wrap:wrap; }
    .cat { flex:1; min-width:70px; } .cat input { position:absolute; opacity:0; pointer-events:none; }
    .cat label { display:block; margin:0; text-align:center; padding:11px 4px; border:1.5px solid var(--line); border-radius:11px; font-size:14px; font-weight:600; cursor:pointer; background:#fff; }
    .cat input:checked + label { background:var(--accent); color:#fff; border-color:var(--accent); }
    .pair { display:flex; gap:10px; align-items:flex-end; }
    .pair > div { flex:1; }
    .out { text-align:center; padding:8px 0; }
    .out .big { font-size:36px; font-weight:800; color:var(--accent); line-height:1.15; word-break:break-all; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { border:1px solid var(--line); padding:7px 6px; text-align:center; }
    th { background:#dff3ec; color:var(--accent-d); }
    h3 { font-size:14px; margin:14px 0 6px; color:var(--accent-d); }
    .note { font-size:11px; color:var(--muted); margin-top:8px; }
    .hide { display:none !important; }
    footer { text-align:center; font-size:11px; color:var(--muted); margin-top:16px; }
  </style>
</head>
<body>
  <header>
    <h1>Go<span>Convert</span> · 換算 📐</h1>
    <div class="sub">長度・重量・溫度・尺寸對照,出國購物超方便</div>
    <div class="nav-row"><a href="hub.html">🎒 全部服務 · Day-A-GoGo</a></div>
  </header>

  <div class="card">
    <div class="cats">
      <div class="cat"><input type="radio" name="cat" id="cLen" value="length" checked /><label for="cLen">長度</label></div>
      <div class="cat"><input type="radio" name="cat" id="cWt" value="weight" /><label for="cWt">重量</label></div>
      <div class="cat"><input type="radio" name="cat" id="cTemp" value="temp" /><label for="cTemp">溫度</label></div>
      <div class="cat"><input type="radio" name="cat" id="cSize" value="size" /><label for="cSize">尺寸表</label></div>
    </div>

    <div id="conv">
      <label>數值</label>
      <input id="val" type="number" inputmode="decimal" value="1" />
      <div class="pair" style="margin-top:8px;">
        <div><label>從</label><select id="from"></select></div>
        <div><label>到</label><select id="to"></select></div>
      </div>
      <div class="out"><div class="big" id="result">—</div></div>
    </div>

    <div id="sizeBox" class="hide">
      <h3>👟 鞋碼對照(約略)</h3>
      <table id="shoeM"></table>
      <h3>👕 衣服尺寸(胸圍約略)</h3>
      <table id="cloth"></table>
      <div class="note">尺碼為約略對照,實際以各品牌標示為準。</div>
    </div>
  </div>

  <footer>GoConvert · 純前端,不需網路</footer>

<script>
(function () {
  "use strict";
  var el = function (id) { return document.getElementById(id); };
  var picked = function (n) { var x = document.querySelector('input[name="' + n + '"]:checked'); return x ? x.value : ""; };

  var UNITS = {
    length: [["mm","公釐 mm",0.001],["cm","公分 cm",0.01],["m","公尺 m",1],["km","公里 km",1000],["in","吋 in",0.0254],["ft","呎 ft",0.3048],["mi","英里 mi",1609.344]],
    weight: [["mg","毫克 mg",0.001],["g","公克 g",1],["kg","公斤 kg",1000],["oz","盎司 oz",28.3495],["lb","磅 lb",453.592]],
    temp:   [["C","攝氏 °C"],["F","華氏 °F"],["K","凱氏 K"]]
  };
  var DEFT = { length:["cm","in"], weight:["kg","lb"], temp:["C","F"] };

  function fillUnits(cat) {
    var list = UNITS[cat], f = el("from"), t = el("to");
    f.innerHTML = ""; t.innerHTML = "";
    list.forEach(function (u) {
      var a = document.createElement("option"); a.value = u[0]; a.textContent = u[1]; f.appendChild(a);
      var b = document.createElement("option"); b.value = u[0]; b.textContent = u[1]; t.appendChild(b);
    });
    f.value = DEFT[cat][0]; t.value = DEFT[cat][1];
  }
  function toC(v, u) { return u === "C" ? v : u === "F" ? (v - 32) * 5 / 9 : v - 273.15; }
  function fromC(c, u) { return u === "C" ? c : u === "F" ? c * 9 / 5 + 32 : c + 273.15; }
  function fmt(v) { return (Math.round(v * 10000) / 10000).toLocaleString(undefined, { maximumFractionDigits: 4 }); }

  function compute() {
    var cat = picked("cat");
    if (cat === "size") return;
    var v = parseFloat(el("val").value); if (isNaN(v)) { el("result").textContent = "—"; return; }
    var f = el("from").value, t = el("to").value, res;
    if (cat === "temp") res = fromC(toC(v, f), t);
    else {
      var map = {}; UNITS[cat].forEach(function (u) { map[u[0]] = u[2]; });
      res = v * map[f] / map[t];
    }
    el("result").textContent = fmt(res) + " " + t;
  }

  function setCat() {
    var cat = picked("cat");
    var size = cat === "size";
    el("sizeBox").classList.toggle("hide", !size);
    el("conv").classList.toggle("hide", size);
    if (!size) { fillUnits(cat); compute(); }
  }

  // size tables
  function table(id, head, rows) {
    var h = "<tr>" + head.map(function (x) { return "<th>" + x + "</th>"; }).join("") + "</tr>";
    var b = rows.map(function (r) { return "<tr>" + r.map(function (x) { return "<td>" + x + "</td>"; }).join("") + "</tr>"; }).join("");
    el(id).innerHTML = h + b;
  }
  table("shoeM", ["腳長cm", "US 男", "US 女", "EU"], [
    ["22", "—", "5", "35"], ["23", "5", "6", "36"], ["24", "6", "7", "38"], ["25", "7", "8", "39"],
    ["26", "8", "9", "41"], ["27", "9", "10", "43"], ["28", "10", "11", "44"], ["29", "11", "12", "45"]
  ]);
  table("cloth", ["尺寸", "胸圍cm", "對應"], [
    ["XS", "78-82", "34"], ["S", "86-90", "36"], ["M", "94-98", "38"], ["L", "102-106", "40"], ["XL", "110-114", "42"], ["XXL", "118-122", "44"]
  ]);

  el("val").addEventListener("input", compute);
  el("from").addEventListener("change", compute);
  el("to").addEventListener("change", compute);
  Array.prototype.forEach.call(document.querySelectorAll('input[name="cat"]'), function (r) { r.addEventListener("change", setCat); });
  fillUnits("length"); compute();
})();
</script>
</body>
</html>
